<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Info Kajian</title>
  <meta name="description" content="Informasi kajian terbaru" />
  <style>
    :root{
      --bg:#0b1220;
      --card:#101a33;
      --muted:#a8b3cf;
      --text:#eef2ff;
      --accent:#7c3aed;
      --border:rgba(255,255,255,.10);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(124,58,237,.35), transparent 60%),
        radial-gradient(900px 450px at 100% 0%, rgba(34,197,94,.22), transparent 55%),
        var(--bg);
      color:var(--text);
    }
    .container{max-width:1100px;margin:0 auto;padding:24px}
    .panel{
      background:rgba(255,255,255,.05);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px;
      margin-bottom:18px;
    }
    h1,h2,h3,p{margin-top:0}
    .filters{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    @media (max-width:700px){ .filters{grid-template-columns:1fr} }
    label{
      display:flex;
      flex-direction:column;
      gap:6px;
      font-size:12px;
      color:var(--muted);
    }
    input,select,button{
      font:inherit;
    }
    input,select{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.22);
      color:var(--text);
      outline:none;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .btn{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      color:var(--text);
      cursor:pointer;
    }
    .btn.primary{
      background:linear-gradient(135deg, rgba(124,58,237,.95), rgba(124,58,237,.58));
      border-color:rgba(124,58,237,.5);
    }
    .loading,.empty{
      padding:16px;
      border-radius:16px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--muted);
    }
    .loading{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }
    .spinner{
      width:16px;
      height:16px;
      border:2px solid rgba(255,255,255,.25);
      border-top-color:#fff;
      border-radius:999px;
      animation:spin .8s linear infinite;
      flex:0 0 auto;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .cards{
      display:grid;
      gap:12px;
    }
    .card{
      background:rgba(0,0,0,.18);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      display:flex;
      gap:14px;
    }
    .datebox{
      min-width:86px;
      text-align:center;
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
      border-radius:14px;
      padding:10px;
    }
    .datebox .d{font-size:24px;font-weight:800;line-height:1;margin:0}
    .datebox .m,.datebox .t{font-size:12px;color:var(--muted);margin:6px 0 0}
    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      color:var(--muted);
      font-size:13px;
      margin-bottom:10px;
    }
    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
    }
    .desc{color:rgba(238,242,255,.88);line-height:1.5}
    .count{color:var(--muted);font-size:13px;margin-top:10px}
  </style>
</head>
<body>
  <div class="container">
    <section class="panel">
      <h1>Info Kajian</h1>
      <p style="color:var(--muted)">Default saat pertama buka: kajian hari ini berdasarkan WIB.</p>

      <div class="filters">
        <label>
          Kata kunci
          <input id="q" placeholder="contoh: tafsir, fiqih, adab..." />
        </label>

        <label>
          Lokasi
          <input id="lokasi" placeholder="contoh: Surabaya, Masjid..." />
        </label>

        <label>
          Ustadz
          <select id="ustadz">
            <option value="">Semua</option>
          </select>
        </label>

        <label>
          Mode
          <select id="mode">
            <option value="">Semua</option>
            <option value="offline">Offline</option>
            <option value="online">Online</option>
          </select>
        </label>

        <label>
          Dari tanggal
          <input id="from" type="date" />
        </label>

        <label>
          Sampai tanggal
          <input id="to" type="date" />
        </label>
      </div>

      <div class="actions">
        <button class="btn primary" id="apply" type="button">Terapkan</button>
        <button class="btn" id="reset" type="button">Reset</button>
      </div>

      <div class="count" id="count">Memuat data…</div>
    </section>

    <div id="loading" class="loading" style="display:none">
      <span class="spinner"></span>
      <span id="loadingText">Memuat data…</span>
    </div>

    <section id="cards" class="cards"></section>
  </div>

<script>
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbO_bJnqZ-ZV9w_hOCHwhQB6-KMdMb1mG9l66I7Ht0YcIguKKVuSuxwR3E-0vlIVHh5-amvMvyhkUz/pub?gid=0&single=true&output=csv";
const FIRST_REFRESH_KEY = "ayokajian_first_refresh_done_v2";

let kajianData = [];

const $ = (sel) => document.querySelector(sel);
const escapeHtml = (s="") => String(s).replace(/[&<>"']/g, m => ({
  "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
}[m]));
const pad2 = (n) => String(n).padStart(2, "0");

function setLoading(show, text="Memuat data…"){
  $("#loading").style.display = show ? "flex" : "none";
  $("#loadingText").textContent = text;
}

function runInitialRefreshOnce(){
  if (sessionStorage.getItem(FIRST_REFRESH_KEY) === "1") return;
  sessionStorage.setItem(FIRST_REFRESH_KEY, "1");
  location.reload();
}

function startAutoRefresh(){
  setInterval(() => {
    const active = document.activeElement;
    const isEditing = active && ["INPUT","SELECT","TEXTAREA"].includes(active.tagName);
    if (!isEditing) location.reload();
  }, 60 * 1000);
}

function getTodayYMDWIB(){
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: "Asia/Jakarta",
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  }).formatToParts(new Date());

  const get = (type) => parts.find(p => p.type === type)?.value || "";
  return `${get("year")}-${get("month")}-${get("day")}`;
}

function normalizeDateYMD(value){
  const s = String(value || "").trim();

  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  const mdy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (mdy) {
    const mm = String(Number(mdy[1])).padStart(2, "0");
    const dd = String(Number(mdy[2])).padStart(2, "0");
    return `${mdy[3]}-${mm}-${dd}`;
  }

  const d = new Date(s);
  if (!Number.isNaN(d.getTime())) {
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }

  return "";
}

function normalizeTimeHHMM(value){
  const s = String(value || "").trim();
  if (/^\d{2}:\d{2}$/.test(s)) return s;
  if (/^\d{1}:\d{2}$/.test(s)) {
    const [h, m] = s.split(":");
    return `${pad2(Number(h))}:${m}`;
  }
  if (/^\d{2}:\d{2}:\d{2}$/.test(s)) return s.slice(0, 5);
  if (/^\d{1}:\d{2}:\d{2}$/.test(s)) {
    const [h, m] = s.split(":");
    return `${pad2(Number(h))}:${m}`;
  }
  return "";
}

function monthNameID(monthIndex){
  return ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"][monthIndex] || "";
}

function toDateObj(dateStr){
  const [y,m,d] = String(dateStr).split("-").map(Number);
  return new Date(y, m - 1, d);
}

function parseCsv(text){
  const rows = [];
  let row = [];
  let cur = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const n = text[i + 1];

    if (c === '"' && inQuotes && n === '"') {
      cur += '"';
      i++;
      continue;
    }
    if (c === '"') {
      inQuotes = !inQuotes;
      continue;
    }
    if (c === ',' && !inQuotes) {
      row.push(cur);
      cur = "";
      continue;
    }
    if ((c === '\n' || c === '\r') && !inQuotes) {
      if (cur.length || row.length) {
        row.push(cur);
        rows.push(row);
      }
      row = [];
      cur = "";
      if (c === '\r' && n === '\n') i++;
      continue;
    }
    cur += c;
  }

  if (cur.length || row.length) {
    row.push(cur);
    rows.push(row);
  }

  return rows;
}

async function loadKajianFromSheet(){
  const res = await fetch(SHEET_CSV_URL, { cache: "no-store" });
  if (!res.ok) throw new Error("Gagal ambil data CSV.");

  const text = await res.text();
  const rows = parseCsv(text);

  if (rows.length < 2) return [];

  const headers = rows[0].map(h => String(h || "").trim().toLowerCase());
  const idx = (key) => headers.indexOf(String(key).toLowerCase());
  const get = (r, key) => {
    const i = idx(key);
    return i === -1 ? "" : String(r[i] || "");
  };

  const minimal = ["title","ustadz","date","time","mode","place"];
  for (const k of minimal) {
    if (idx(k) === -1) throw new Error(`Header "${k}" tidak ada.`);
  }

  return rows.slice(1)
    .filter(r => r.some(v => String(v || "").trim() !== ""))
    .map(r => ({
      id: get(r, "id").trim(),
      title: get(r, "title").trim(),
      ustadz: get(r, "ustadz").trim(),
      topic: get(r, "topic").trim(),
      date: normalizeDateYMD(get(r, "date")),
      time: normalizeTimeHHMM(get(r, "time")),
      mode: (get(r, "mode").trim().toLowerCase() === "online" ? "online" : "offline"),
      place: get(r, "place").trim(),
      address: get(r, "address").trim(),
      mapsUrl: get(r, "mapsurl").trim(),
      streamUrl: get(r, "streamurl").trim(),
      registerUrl: get(r, "registerurl").trim(),
      notes: get(r, "notes").trim()
    }))
    .filter(x => x.title && x.ustadz && x.date && x.time && x.place);
}

function hydrateUstadzOptions(data){
  const select = $("#ustadz");
  const current = select.value;
  select.innerHTML = `<option value="">Semua</option>`;
  [...new Set(data.map(x => x.ustadz).filter(Boolean))]
    .sort((a,b) => a.localeCompare(b))
    .forEach(name => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    });
  select.value = current;
}

function getFilters(){
  return {
    q: $("#q").value.trim().toLowerCase(),
    lokasi: $("#lokasi").value.trim().toLowerCase(),
    ustadz: $("#ustadz").value,
    mode: $("#mode").value,
    from: $("#from").value,
    to: $("#to").value
  };
}

function matchItem(item, f){
  const hay = [
    item.title, item.topic, item.place, item.address, item.ustadz, item.notes
  ].join(" ").toLowerCase();

  if (f.q && !hay.includes(f.q)) return false;

  const locHay = [item.place, item.address].join(" ").toLowerCase();
  if (f.lokasi && !locHay.includes(f.lokasi)) return false;

  if (f.ustadz && item.ustadz !== f.ustadz) return false;
  if (f.mode && item.mode !== f.mode) return false;
  if (f.from && item.date < f.from) return false;
  if (f.to && item.date > f.to) return false;

  return true;
}

function sortByDateTime(a, b){
  const A = `${a.date}T${a.time}:00`;
  const B = `${b.date}T${b.time}:00`;
  return A.localeCompare(B);
}

function setCounts(total, shown){
  $("#count").textContent = `Menampilkan ${shown} dari ${total} kajian.`;
}

function renderCards(list, emptyMessage="Tidak ada kajian yang cocok."){
  const wrap = $("#cards");
  wrap.innerHTML = "";

  if (!list.length) {
    wrap.innerHTML = `<div class="empty">${escapeHtml(emptyMessage)}</div>`;
    return;
  }

  for (const item of list) {
    const dt = toDateObj(item.date);
    const d = dt.getDate();
    const m = monthNameID(dt.getMonth());

    const card = document.createElement("article");
    card.className = "card";
    card.innerHTML = `
      <div class="datebox">
        <p class="d">${d}</p>
        <p class="m">${m}</p>
        <p class="t">${escapeHtml(item.time)} WIB</p>
      </div>
      <div style="flex:1">
        <h3>${escapeHtml(item.title)}</h3>
        <div class="meta">
          <span class="pill">${item.mode === "online" ? "💻 Online" : "🕌 Offline"}</span>
          <span class="pill">👤 ${escapeHtml(item.ustadz)}</span>
          ${item.topic ? `<span class="pill">🏷️ ${escapeHtml(item.topic)}</span>` : ``}
          <span class="pill">📍 ${escapeHtml(item.place)}</span>
        </div>
        ${item.notes ? `<p class="desc">${escapeHtml(item.notes)}</p>` : ``}
      </div>
    `;
    wrap.appendChild(card);
  }
}

function updateUrlFromFilters(f){
  const url = new URL(location.href);

  if (f.q) url.searchParams.set("q", f.q); else url.searchParams.delete("q");
  if (f.lokasi) url.searchParams.set("lokasi", f.lokasi); else url.searchParams.delete("lokasi");
  if (f.ustadz) url.searchParams.set("ustadz", f.ustadz); else url.searchParams.delete("ustadz");
  if (f.mode) url.searchParams.set("mode", f.mode); else url.searchParams.delete("mode");
  if (f.from) url.searchParams.set("from", f.from); else url.searchParams.delete("from");
  if (f.to) url.searchParams.set("to", f.to); else url.searchParams.delete("to");

  history.replaceState({}, "", url);
}

function loadFiltersFromUrl(){
  const sp = new URL(location.href).searchParams;
  $("#q").value = sp.get("q") || "";
  $("#lokasi").value = sp.get("lokasi") || "";
  $("#ustadz").value = sp.get("ustadz") || "";
  $("#mode").value = sp.get("mode") || "";
  $("#from").value = sp.get("from") || "";
  $("#to").value = sp.get("to") || "";
}

function hasAnyUrlFilter(){
  const sp = new URL(location.href).searchParams;
  return !!(
    sp.get("q") || sp.get("lokasi") || sp.get("ustadz") ||
    sp.get("mode") || sp.get("from") || sp.get("to")
  );
}

function applyFilters(pushState=true, emptyMessage="Tidak ada kajian yang cocok dengan filter."){
  const f = getFilters();
  const filtered = kajianData
    .slice()
    .sort(sortByDateTime)
    .filter(item => matchItem(item, f));

  renderCards(filtered, emptyMessage);
  setCounts(kajianData.length, filtered.length);
  if (pushState) updateUrlFromFilters(f);
}

function applyInitialTodayFilter(){
  if (hasAnyUrlFilter()) {
    applyFilters(false);
    return;
  }

  const today = getTodayYMDWIB();
  $("#from").value = today;
  $("#to").value = today;

  const filtered = kajianData
    .slice()
    .sort(sortByDateTime)
    .filter(item => item.date === today);

  renderCards(filtered, "Tidak ada kajian hari ini.");
  setCounts(kajianData.length, filtered.length);
  updateUrlFromFilters(getFilters());
}

(async function init(){
  runInitialRefreshOnce();
  startAutoRefresh();

  setLoading(true, "Memuat data kajian...");
  try {
    kajianData = await loadKajianFromSheet();
  } catch (e) {
    setLoading(false);
    renderCards([], `Gagal memuat data: ${e.message}`);
    setCounts(0, 0);
    return;
  }

  hydrateUstadzOptions(kajianData);
  loadFiltersFromUrl();
  applyInitialTodayFilter();
  setLoading(false);

  let t;
  ["q","lokasi"].forEach(id => {
    $("#" + id).addEventListener("input", () => {
      clearTimeout(t);
      t = setTimeout(() => applyFilters(true), 250);
    });
  });

  ["ustadz","mode","from","to"].forEach(id => {
    $("#" + id).addEventListener("change", () => applyFilters(true));
  });

  $("#apply").addEventListener("click", () => applyFilters(true));
  $("#reset").addEventListener("click", () => {
    $("#q").value = "";
    $("#lokasi").value = "";
    $("#ustadz").value = "";
    $("#mode").value = "";
    $("#from").value = "";
    $("#to").value = "";
    applyFilters(true, "Tidak ada kajian yang cocok dengan filter.");
  });
})();
</script>
</body>
</html>
